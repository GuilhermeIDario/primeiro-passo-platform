<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vagas disponíveis | Primeiro Passo">
  <title>Vagas | Primeiro Passo</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="dashboard">

  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Menu lateral"></aside>

  <main class="content">

    <header class="topbar" role="banner"></header>

    <div class="page-body">

      <div class="page-header">
        <h1>Vagas Disponíveis</h1>
        <p>Oportunidades compatíveis com o seu perfil.</p>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="search"
          placeholder="Pesquisar vaga..."
          aria-label="Pesquisar vagas"
        >
      </div>

      <!-- Job cards -->
      <div class="vagas-grid" role="list">

        <div class="job-card" role="listitem">
          <h3>Assistente Administrativo</h3>
          <p>Empresa XPTO</p>
          <div class="job-card-meta">
            <span>Colatina - ES</span>
            <span class="job-type">Presencial</span>
          </div>
          <button class="btn-primary">Ver Vaga</button>
        </div>

        <div class="job-card" role="listitem">
          <h3>Jovem Aprendiz</h3>
          <p>Empresa ABC</p>
          <div class="job-card-meta">
            <span>Remoto</span>
            <span class="job-type">CLT</span>
          </div>
          <button class="btn-primary">Ver Vaga</button>
        </div>

        <div class="job-card" role="listitem">
          <h3>Estágio em TI</h3>
          <p>Startup Tech</p>
          <div class="job-card-meta">
            <span>Vitória - ES</span>
            <span class="job-type">Estágio</span>
          </div>
          <button class="btn-primary">Ver Vaga</button>
        </div>

        <div class="job-card" role="listitem">
          <h3>Auxiliar de Escritório</h3>
          <p>Empresa Delta</p>
          <div class="job-card-meta">
            <span>Linhares - ES</span>
            <span class="job-type">Presencial</span>
          </div>
          <button class="btn-primary">Ver Vaga</button>
        </div>

      </div>

    </div>

  </main>

</div>

<script src="js/sidebar.js"></script>
<script src="js/vagas.js"></script>
</body>
</html>
