<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Meu Perfil | Primeiro Passo">
  <title>Meu Perfil | Primeiro Passo</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="dashboard">

  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Menu lateral"></aside>

  <main class="content">

    <header class="topbar" role="banner"></header>

    <div class="page-body">

      <div class="page-header">
        <h1>Meu Perfil</h1>
        <p>Mantenha suas informações atualizadas para receber melhores recomendações.</p>
      </div>

      <!-- Completion progress -->
      <div class="profile-progress" aria-label="Progresso do perfil">
        <div class="profile-progress-header">
          <span>Perfil Completo</span>
          <span id="progressLabel">0%</span>
        </div>
        <div class="progress-bar-wrap" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-labelledby="progressLabel">
          <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
        </div>
      </div>

      <form class="profile-form" novalidate>

        <div class="input-group">
          <label for="perfilNome">Nome Completo</label>
          <input id="perfilNome" type="text" placeholder="Seu nome completo" autocomplete="name">
        </div>

        <div class="input-group">
          <label for="perfilEmail">E-mail</label>
          <input id="perfilEmail" type="email" placeholder="seu@email.com" autocomplete="email">
        </div>

        <div class="input-group">
          <label for="perfilTelefone">Telefone</label>
          <input id="perfilTelefone" type="tel" placeholder="(00) 00000-0000" autocomplete="tel">
        </div>

        <div class="input-group">
          <label for="perfilCidade">Cidade</label>
          <input id="perfilCidade" type="text" placeholder="Sua cidade" autocomplete="address-level2">
        </div>

        <div class="input-group">
          <label for="perfilObjetivo">Objetivo Profissional</label>
          <input id="perfilObjetivo" type="text" placeholder="Ex: Estágio em TI, Jovem Aprendiz...">
        </div>

        <div class="input-group">
          <label for="perfilHabilidades">Habilidades</label>
          <textarea
            id="perfilHabilidades"
            placeholder="Descreva suas habilidades técnicas e interpessoais"
            rows="5"
          ></textarea>
        </div>

        <button type="submit" class="btn-primary">Salvar Alterações</button>

      </form>

    </div>

  </main>

</div>

<script src="js/sidebar.js"></script>
<script src="js/perfil.js"></script>
</body>
</html>
