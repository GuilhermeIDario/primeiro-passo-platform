<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Crie sua conta gratuita na plataforma Primeiro Passo.">
  <title>Cadastro | Primeiro Passo</title>
  <link rel="icon" href="img/favicon.ico">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-container">

  <!-- LEFT: illustration -->
  <div class="auth-left" aria-hidden="true">
    <!-- CADASTRO ILLUSTRATION -->
    <img src="img/cadastro.png" alt="">
  </div>

  <!-- RIGHT: form -->
  <div class="auth-right">
    <div class="auth-card">

      <a href="index.html" class="auth-logo">
        <!-- LOGO -->
        <img src="imagens/logo-fazer.png" alt="">
        Primeiro Passo
      </a>

      <div>
        <h1>Crie sua conta</h1>
        <p>Dê o primeiro passo para sua carreira.</p>
      </div>

      <form id="cadastroForm" novalidate>

        <div class="input-group">
          <label for="cadastroNome">Nome Completo</label>
          <input
            id="cadastroNome"
            type="text"
            placeholder="Seu nome completo"
            autocomplete="name"
            required
          >
          <span class="input-error-msg" role="alert"></span>
        </div>

        <div class="input-group">
          <label for="cadastroEmail">E-mail</label>
          <input
            id="cadastroEmail"
            type="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          >
          <span class="input-error-msg" role="alert"></span>
        </div>

        <div class="input-group">
          <label for="cadastroSenha">Senha</label>
          <div class="input-password-wrap">
            <input
              id="cadastroSenha"
              type="password"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
              required
            >
            <button
              type="button"
              class="toggle-password"
              aria-label="Mostrar senha"
            >
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="input-error-msg" role="alert"></span>
        </div>

        <div class="input-group">
          <label for="cadastroConfirmar">Confirmar Senha</label>
          <div class="input-password-wrap">
            <input
              id="cadastroConfirmar"
              type="password"
              placeholder="Repita a senha"
              autocomplete="new-password"
              required
            >
            <button
              type="button"
              class="toggle-password"
              aria-label="Mostrar senha"
            >
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="input-error-msg" role="alert"></span>
        </div>

        <div class="input-group">
          <label for="cadastroCidade">Cidade <span style="color:var(--color-text-muted);font-weight:400">(opcional)</span></label>
          <input
            id="cadastroCidade"
            type="text"
            placeholder="Sua cidade"
            autocomplete="address-level2"
          >
        </div>

        <button type="submit" class="btn-primary">Criar Conta</button>

      </form>

      <span>
        Já possui conta?
        <a href="login.html">Entrar</a>
      </span>

    </div>
  </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
