<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro | Primeiro Passo</title>

    <link rel="stylesheet" href="css/global.css">

    <link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-left">

        <!-- IMAGEM CADASTRO -->

        <img src="img/cadastro.png" alt="Cadastro">

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h1>Crie sua conta</h1>

            <p>
                Dê o primeiro passo para sua carreira.
            </p>

            <form id="cadastroForm">

                <div class="input-group">

                    <label>Nome Completo</label>

                    <input
                        type="text"
                        required
                    >

                </div>

                <div class="input-group">

                    <label>Email</label>

                    <input
                        type="email"
                        required
                    >

                </div>

                <div class="input-group">

                    <label>Senha</label>

                    <input
                        type="password"
                        required
                    >

                </div>

                <div class="input-group">

                    <label>Confirmar Senha</label>

                    <input
                        type="password"
                        required
                    >

                </div>

                <div class="input-group">

                    <label>Cidade</label>

                    <input
                        type="text"
                    >

                </div>

                <button
                    type="submit"
                    class="btn-primary"
                >

                    Criar Conta

                </button>

            </form>

            <span>

                Já possui conta?

                <a href="login.html">

                    Entrar

                </a>

            </span>

        </div>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
