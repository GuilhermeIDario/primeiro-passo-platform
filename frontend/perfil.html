<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meu Perfil | Primeiro Passo</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/pages.css">

</head>

<body>

    <div class="dashboard">

        <aside class="sidebar">

            <div class="logo">

                <!-- IMAGEM DA LOGO -->

                <img src="img/logo.png" alt="Primeiro Passo">

            </div>

            <nav>

                <ul>

                    <li onclick="location.href='dashboard.html'">
                        Dashboard
                    </li>

                    <li class="active">
                        Meu Perfil
                    </li>

                    <li onclick="location.href='vagas.html'">
                        Vagas
                    </li>

                    <li onclick="location.href='curriculo.html'">
                        Currículo IA
                    </li>

                    <li onclick="location.href='entrevista.html'">
                        Entrevistas
                    </li>

                    <li onclick="location.href='cursos.html'">
                        Cursos
                    </li>

                </ul>

            </nav>

        </aside>

        <main class="content">

            <h1>Meu Perfil</h1>

            <form class="profile-form">

                <input
                    type="text"
                    placeholder="Nome Completo"
                    required
                >

                <input
                    type="email"
                    placeholder="Email"
                    required
                >

                <input
                    type="text"
                    placeholder="Telefone"
                >

                <input
                    type="text"
                    placeholder="Cidade"
                >

                <input
                    type="text"
                    placeholder="Objetivo Profissional"
                >

                <textarea
                    placeholder="Descreva suas habilidades"
                    rows="6"
                ></textarea>

                <button
                    type="submit"
                    class="btn-primary"
                >
                    Salvar Alterações
                </button>

            </form>

        </main>

    </div>

    <script src="js/perfil.js"></script>

</body>

</html>
